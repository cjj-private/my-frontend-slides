<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 新加坡副业破局 - Felix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #ff0000;
            --secondary: #f0f0f0;
            --transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-snap-type: y mandatory;
            cursor: none; /* 隐藏原生鼠标，使用自定义尾巴 */
        }

        /* 鼠标尾巴样式 */
        #cursor-dot {
            width: 8px; height: 8px; background: var(--accent);
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 999;
        }
        #cursor-outline {
            width: 40px; height: 40px; border: 1px solid var(--accent);
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 998;
            transition: transform 0.15s ease-out; /* 产生跟随延迟感 */
        }

        section.slide {
            height: 100vh; width: 100vw; display: flex; flex-direction: column;
            justify-content: center; align-items: flex-start;
            padding: 8% 12%; box-sizing: border-box; scroll-snap-align: start;
            position: relative; overflow: hidden;
        }

        /* 视差容器：让内容可以产生位移 */
        .parallax-wrapper {
            max-width: 1100px; width: 100%;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        h1 { font-size: clamp(2.5rem, 6vw, 5.5rem); line-height: 0.9; font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; }
        h2 { font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 900; margin-bottom: 2rem; }
        p { font-size: 1.4rem; line-height: 1.5; color: #333; }

        .point-item { border-top: 5px solid var(--text); padding-top: 20px; margin-top: 30px; }
        
        /* 动画逻辑 */
        .reveal { opacity: 0; transform: translateY(30px); transition: var(--transition); }
        .slide.active .reveal { opacity: 1; transform: translateY(0); }

        .progress-bar { position: fixed; left: 0; bottom: 0; height: 10px; background: var(--text); width: 0%; z-index: 100; }

        /* 移动端隐藏自定义鼠标 */
        @media (max-width: 768px) {
            #cursor-dot, #cursor-outline { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>
    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <div class="progress-bar" id="progress"></div>

    <section class="slide active">
        <div class="parallax-wrapper">
            <h1 class="reveal">2026 新加坡<br><span style="color:var(--accent)">副业破局</span></h1>
            <p class="reveal">店小二创始人团队内部商业闭环复盘</p>
        </div>
    </section>

    <section class="slide" style="background:#f9f9f9;">
        <div class="parallax-wrapper">
            <h2 class="reveal">全自动<br>获客系统</h2>
            <div class="point-item reveal">
                <p>FB 广告 + Kit.com 自动跟进：<br>解决“怕找人”的恐惧，让合伙人主动找你。</p>
            </div>
        </div>
    </section>

    <script>
        // 1. 鼠标尾巴逻辑
        const dot = document.getElementById('cursor-dot');
        const outline = document.getElementById('cursor-outline');
        
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            dot.style.left = `${posX}px`;
            dot.style.top = `${posY}px`;

            // 延迟跟随效果
            setTimeout(() => {
                outline.style.left = `${posX - 16}px`;
                outline.style.top = `${posY - 16}px`;
            }, 50);

            // 2. 左右移动视差效果
            const moveX = (window.innerWidth / 2 - posX) * 0.02; // 调整 0.02 改变灵敏度
            const moveY = (window.innerHeight / 2 - posY) * 0.01;
            
            document.querySelectorAll('.parallax-wrapper').forEach(el => {
                el.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        // 3. 滚动观察
        const slides = document.querySelectorAll('.slide');
        const progress = document.getElementById('progress');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    const idx = Array.from(slides).indexOf(entry.target);
                    progress.style.width = ((idx + 1) / slides.length * 100) + '%';
                }
            });
        }, { threshold: 0.5 });
        slides.forEach(s => observer.observe(s));
    </script>
</body>
</html>
