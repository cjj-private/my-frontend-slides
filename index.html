<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Creative Presentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --text: #ffffff; --accent: #ff3e00; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; scroll-snap-type: y mandatory; }
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; scroll-snap-align: start; text-align: center; }
        h1 { font-size: 8vw; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        .accent { color: var(--accent); }
        p { font-size: 1.5rem; opacity: 0.6; max-width: 600px; }
        .cursor { width: 20px; height: 20px; border: 2px solid var(--accent); border-radius: 50%; position: fixed; pointer-events: none; transition: transform 0.1s; z-index: 100; }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <section>
        <h1>HELLO <span class="accent">WORLD</span></h1>
        <p>这是一个基于 Frontend-Slides 风格的纯净演示文稿。</p>
    </section>
    <section>
        <h1>DESIGN <span class="accent">FIRST</span></h1>
        <p>无需复杂框架，只需 HTML & CSS。</p>
    </section>
    <section>
        <h1>STAY <span class="accent">COOL</span></h1>
        <p>代码即艺术。感谢访问我的 GitHub Pages。</p>
    </section>

    <script>
        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
        });
    </script>
</body>
</html>
